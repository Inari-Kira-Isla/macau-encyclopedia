  <script>
  (function() {
    const PER_PAGE = 24;
    const INDUSTRY_NAMES = {"gourmet": "美食", "dining": "美食", "tourism": "旅遊", "entertainment": "娛樂", "accommodation": "住宿", "shopping": "購物", "transport": "交通"};
    let articles = [];
    let fuse = null;
    let filtered = [];
    let currentFilter = 'all';
    let currentPage = 1;
    let currentSort = 'newest';

    fetch('/articles.json').then(r => r.json()).then(data => {
      articles = data;
      filtered = [...articles];
      fuse = new Fuse(articles, { keys: ['t', 'g', 'a', 'c'], threshold: 0.3 });
      sortAndRender();
    });

    document.getElementById('searchInput').addEventListener('input', function(e) {
      const q = e.target.value.trim();
      if (q.length === 0) {
        filtered = currentFilter === 'all' ? [...articles] : articles.filter(a => a.i === currentFilter);
      } else {
        const base = currentFilter === 'all' ? articles : articles.filter(a => a.i === currentFilter);
        fuse = new Fuse(base, { keys: ['t', 'g', 'a', 'c'], threshold: 0.3 });
        filtered = fuse.search(q).map(r => r.item);
      }
      currentPage = 1;
      sortAndRender();
    });

    document.getElementById('sortSelect').addEventListener('change', function(e) {
      currentSort = e.target.value;
      currentPage = 1;
      sortAndRender();
    });

    document.querySelector('.filter-bar').addEventListener('click', function(e) {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.industry;
      const q = document.getElementById('searchInput').value.trim();
      if (q.length === 0) {
        filtered = currentFilter === 'all' ? [...articles] : articles.filter(a => a.i === currentFilter);
      } else {
        const base = currentFilter === 'all' ? articles : articles.filter(a => a.i === currentFilter);
        fuse = new Fuse(base, { keys: ['t', 'g', 'a', 'c'], threshold: 0.3 });
        filtered = fuse.search(q).map(r => r.item);
      }
      currentPage = 1;
      sortAndRender();
    });

    function sortAndRender() {
      const sorted = [...filtered];
      if (currentSort === 'newest') sorted.sort((a,b) => b.d.localeCompare(a.d));
      else if (currentSort === 'quality') sorted.sort((a,b) => b.q - a.q);
      else if (currentSort === 'longest') sorted.sort((a,b) => b.w - a.w);
      else if (currentSort === 'title') sorted.sort((a,b) => a.t.localeCompare(b.t, 'zh'));
      filtered = sorted;
      render();
    }

    function render() {
      const total = filtered.length;
      const pages = Math.ceil(total / PER_PAGE);
      if (currentPage > pages) currentPage = pages || 1;
      const start = (currentPage - 1) * PER_PAGE;
      const slice = filtered.slice(start, start + PER_PAGE);

      document.getElementById('resultsInfo').textContent = total + ' 篇文章' + (currentFilter !== 'all' ? ' (' + (INDUSTRY_NAMES[currentFilter] || currentFilter) + ')' : '');

      const grid = document.getElementById('cardGrid');
      grid.innerHTML = slice.map(a => {
        const ind = INDUSTRY_NAMES[a.i] || a.i;
        const tags = (a.g || []).slice(0, 3).map(t => '<span>' + t + '</span>').join('');
        return '<a class="card" href="articles/' + a.s + '.html">'
          + '<span class="card-industry">' + ind + '</span>'
          + '<h3>' + a.t + '</h3>'
          + '<div class="card-meta"><span>' + a.w + ' 字</span><span>' + a.a.replace(/-/g, ' ') + '</span><span>' + a.d + '</span></div>'
          + (tags ? '<div class="card-tags">' + tags + '</div>' : '')
          + '</a>';
      }).join('');

      const pag = document.getElementById('pagination');
      if (pages <= 1) { pag.innerHTML = ''; return; }
      let btns = '<button ' + (currentPage<=1?'disabled':'') + ' onclick="window._ep(' + (currentPage-1) + ')">&#8249;</button>';
      const range = 3;
      for (let i = 1; i <= pages; i++) {
        if (i === 1 || i === pages || (i >= currentPage-range && i <= currentPage+range)) {
          btns += '<button class="' + (i===currentPage?'active':'') + '" onclick="window._ep(' + i + ')">' + i + '</button>';
        } else if (i === currentPage-range-1 || i === currentPage+range+1) {
          btns += '<button disabled>...</button>';
        }
      }
      btns += '<button ' + (currentPage>=pages?'disabled':'') + ' onclick="window._ep(' + (currentPage+1) + ')">&#8250;</button>';
      pag.innerHTML = btns;
    }

    window._ep = function(p) { currentPage = p; render(); window.scrollTo(0, document.querySelector('.card-grid').offsetTop - 100); };
  })();
  </script>
